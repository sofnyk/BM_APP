<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ψηφιακό Αναλόγιο</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #c0392b;
            --bg: #f8f9fa;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: var(--bg); 
            color: #333;
        }
        header {
            background-color: var(--primary);
            color: white;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { margin: 0; font-size: 2.5em; letter-spacing: 1px; }
        
        .search-container {
            max-width: 800px;
            margin: -25px auto 20px auto;
            padding: 0 20px;
            position: relative;
        }
        #searchInput {
            width: 100%;
            padding: 20px 25px;
            font-size: 1.2em;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 5px 20px rgba(192, 57, 43, 0.2);
        }

        /* Κουμπιά εναλλαγής προβολής */
        .view-controls {
            max-width: 1200px;
            margin: 0 auto 20px auto;
            padding: 0 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .view-btn {
            background-color: #e0e0e0;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            color: #333;
            transition: 0.2s;
        }
        .view-btn.active {
            background-color: var(--primary);
            color: white;
        }

        /* Προεπιλεγμένη προβολή: ΠΛΕΓΜΑ (Grid) */
        .results-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        .book-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        /* Προβολή: ΛΙΣΤΑ (List) */
        .results-container.list-view {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .results-container.list-view .book-card {
            flex-direction: row;
            align-items: center;
            padding: 15px 25px;
        }
        .results-container.list-view .book-info {
            flex: 1; /* Πιάνει τον αριστερό χώρο */
        }
        .results-container.list-view .book-year {
            margin-bottom: 0;
        }
        .results-container.list-view .pdf-buttons {
            margin-top: 0;
            margin-left: 20px;
            flex-wrap: nowrap;
        }

        /* Γενικά στυλ κάρτας */
        .book-title {
            font-size: 1.3em;
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        .book-author { color: #7f8c8d; font-size: 1em; margin-bottom: 5px; }
        .book-year { color: #95a5a6; font-size: 0.9em; margin-bottom: 20px; }
        .pdf-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: auto;
        }
        .pdf-btn {
            background-color: var(--accent);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            flex: 1;
            transition: background 0.3s;
        }
        .pdf-btn:hover { background-color: #a5281b; }
        .no-results {
            text-align: center;
            grid-column: 1 / -1;
            font-size: 1.2em;
            color: #7f8c8d;
            padding: 50px;
        }

        /* Κινητά / Μικρά Tablets */
        @media (max-width: 768px) {
            .results-container.list-view .book-card {
                flex-direction: column;
                align-items: flex-start;
            }
            .results-container.list-view .pdf-buttons {
                margin-left: 0;
                margin-top: 15px;
                width: 100%;
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Ψηφιακό Αναλόγιο</h1>
        <p>Βιβλιοθήκη Βυζαντινής Μουσικής</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Αναζήτηση (π.χ. Δοξαστάριο, Πέτρος, 1820)..." oninput="searchBooks()">
    </div>

    <div class="view-controls">
        <button id="gridBtn" class="view-btn active" onclick="setView('grid')">🔲 Πλέγμα</button>
        <button id="listBtn" class="view-btn" onclick="setView('list')">📄 Λίστα</button>
    </div>

    <div class="results-container" id="results">
        </div>

    <script>
        // Λειτουργία αλλαγής προβολής (και αποθήκευση στη μνήμη του browser)
        function setView(viewType) {
            const container = document.getElementById('results');
            const gridBtn = document.getElementById('gridBtn');
            const listBtn = document.getElementById('listBtn');

            if (viewType === 'list') {
                container.classList.add('list-view');
                listBtn.classList.add('active');
                gridBtn.classList.remove('active');
                localStorage.setItem('bm_view_pref', 'list'); // Αποθήκευση
            } else {
                container.classList.remove('list-view');
                gridBtn.classList.add('active');
                listBtn.classList.remove('active');
                localStorage.setItem('bm_view_pref', 'grid'); // Αποθήκευση
            }
        }

        // Φόρτωση της σελίδας: Διάβασμα μνήμης και αναζήτηση βιβλίων
        window.onload = () => {
            const savedView = localStorage.getItem('bm_view_pref') || 'grid';
            setView(savedView);
            searchBooks();
        };

        // Η συνάρτηση που φέρνει τα δεδομένα από το API
        async function searchBooks() {
            const query = document.getElementById('searchInput').value;
            const resultsContainer = document.getElementById('results');
            
            try {
                // Χτυπάμε τον Σερβιτόρο μας
                const response = await fetch('/search?q=' + encodeURIComponent(query));
                const data = await response.json();
                
                resultsContainer.innerHTML = ''; 

                if (data.status !== 'success' || data.data.length === 0) {
                    resultsContainer.innerHTML = '<div class="no-results">Δεν βρέθηκαν βιβλία με αυτούς τους όρους.</div>';
                    return;
                }

                data.data.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    
                    let buttonsHtml = '';
                    book.pdf_urls.forEach((url, index) => {
                        // 1. Παίρνουμε το όνομα του αρχείου από το τέλος του link και το "αποκωδικοποιούμε" (για τα Ελληνικά)
                        let fileName = decodeURIComponent(url.split('/').pop());
                        
                        // 2. Ελέγχουμε αν έχει bkm (Σελιδοδείκτες)
                        const hasBookmarks = fileName.toLowerCase().includes('bkm');
                        const bkmBadge = hasBookmarks ? ' 🔖' : '';
                        
                        // 3. "Καθαρίζουμε" το όνομα (βγάζουμε το .pdf και το bkm για να γίνει ωραία ταμπέλα)
                        let cleanName = fileName.replace(/\.pdf$/i, '')
                                                .replace(/-bkm/i, '')
                                                .replace(/_bkm/i, '')
                                                .replace(/bkm/i, '')
                                                .trim();
                        
                        // 4. Αν το βιβλίο έχει 1 αρχείο, γράφει απλά "Άνοιγμα PDF". Αν έχει 2+, γράφει το όνομα!
                        const btnText = book.pdf_urls.length > 1 
                            ? `📖 ${cleanName}${bkmBadge}` 
                            : `📖 Άνοιγμα PDF${bkmBadge} ${hasBookmarks ? '(Με Σελιδοδείκτες)' : ''}`;
                            
                        // Το title βοηθάει ώστε αν αφήσεις το ποντίκι πάνω στο κουμπί, να σου δείξει ολόκληρο το όνομα
                        buttonsHtml += `<a href="${url}" target="_blank" class="pdf-btn" title="${cleanName}">${btnText}</a>`;
                    });

                    card.innerHTML = `
                        <div class="book-info">
                            <div class="book-title">${book.title}</div>
                            <div class="book-author">👤 ${book.author_publisher || 'Άγνωστος'}</div>
                            <div class="book-year">📅 ${book.publication_year || 'Χ.Χ.'}</div>
                        </div>
                        <div class="pdf-buttons">
                            ${buttonsHtml}
                        </div>
                    `;
                    resultsContainer.appendChild(card);
                });
            } catch (error) {
                resultsContainer.innerHTML = '<div class="no-results" style="color: red;">Σφάλμα: Ο Σερβιτόρος (μαύρο παράθυρο) δεν απαντά!</div>';
            }
        }
    </script>
</body>
</html>
