<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ψηφιακό Αναλόγιο</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #27ae60; 
            --bg: #f8fafc; 
            --white: #ffffff;
            --success: #2ecc71;
            --danger: #e74c3c;
            --premium-gold: #d4af37; /* Χρώμα για τα Premium στοιχεία */
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; background-color: var(--bg); color: #333; 
        }

        header {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            color: white; padding: 60px 20px; text-align: center; position: relative;
        }

        header h1 { margin: 0; font-size: 2.5em; letter-spacing: 1px; }

        .search-container {
            max-width: 700px; margin: -30px auto 20px auto;
            padding: 0 20px; position: relative; z-index: 1000;
        }

        #searchInput {
            width: 100%; padding: 20px 30px; font-size: 1.1em; border: none;
            border-radius: 50px; box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            outline: none; transition: 0.3s; box-sizing: border-box;
        }

        /* PREMIUM CHIPS STYLE */
        .premium-chips-container {
            display: none; /* Κρυφό αρχικά */
            max-width: 700px; margin: 0 auto 20px auto;
            padding: 0 20px; flex-wrap: wrap; gap: 10px;
            justify-content: center; animation: fadeIn 0.5s ease;
        }

        .chip {
            background: white; border: 1px solid var(--premium-gold);
            color: var(--primary); padding: 8px 16px; border-radius: 20px;
            font-size: 0.9em; font-weight: 600; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; gap: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .chip:hover {
            background: var(--premium-gold); color: white;
            transform: translateY(-2px); box-shadow: 0 5px 10px rgba(212, 175, 55, 0.3);
        }

        .chip::before { content: '⭐'; font-size: 0.8em; }

        .view-controls {
            max-width: 1200px; margin: 0 auto 20px auto; padding: 0 20px;
            display: flex; justify-content: flex-end; gap: 10px;
        }

        .view-btn {
            background-color: var(--white); border: 1px solid #e2e8f0; padding: 10px 18px;
            border-radius: 10px; cursor: pointer; font-weight: 600; color: #64748b;
        }

        .view-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }

        .results-container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px;
        }

        .book-card {
            background: var(--white); border-radius: 18px; padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex;
            flex-direction: column; justify-content: space-between; transition: 0.3s;
            border: 1px solid #f1f5f9;
        }

        .book-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }

        .book-title { font-size: 1.3em; color: var(--primary); font-weight: 700; margin-bottom: 8px; }
        .book-meta { font-size: 0.95em; color: #64748b; margin-bottom: 15px; }

        .pdf-btn {
            background-color: var(--accent); color: white; text-decoration: none;
            padding: 12px 18px; border-radius: 10px; font-weight: 700; font-size: 0.9em;
            flex: 1; text-align: center; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            box-shadow: 0 4px 0 #1e8449;
        }

        .pdf-btn:hover { background-color: #2ecc71; transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }

        .nav-auth-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; border: none; border-radius: 50px;
            font-weight: 700; cursor: pointer; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s;
        }

        /* MODAL STYLES (Προηγούμενο update) */
        #auth-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7); z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(8px);
        }
        .modal-content { background: white; padding: 40px; border-radius: 24px; width: 340px; text-align: center; position: relative; }
        .input-group { position: relative; margin-bottom: 15px; }
        .input-group input { width: 100%; padding: 14px 14px 14px 40px; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; }
        .pwd-rules { display: none; flex-direction: column; gap: 6px; text-align: left; font-size: 0.85em; margin-bottom: 15px; }
        .pwd-rule.valid { color: var(--accent); }
        .pwd-rule.valid::before { content: '✅ '; }
        .auth-tabs { display: flex; background: #f1f5f9; border-radius: 12px; margin-bottom: 25px; padding: 4px; }
        .auth-tab { flex: 1; padding: 10px; cursor: pointer; font-weight: 600; border-radius: 8px; }
        .auth-tab.active { background: white; color: var(--primary); }
    </style>
</head>
<body>

    <header>
        <h1>Ψηφιακό Αναλόγιο</h1>
        <p>Βιβλιοθήκη Βυζαντινής Μουσικής</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Αναζήτηση..." oninput="searchBooks()">
    </div>

    <div id="premium-chips" class="premium-chips-container">
        <div class="chip" onclick="quickSearch('αναστασιματάριο')">Αναστασιματάριο</div>
        <div class="chip" onclick="quickSearch('δοξαστάριο')">Δοξαστάριο</div>
        <div class="chip" onclick="quickSearch('ειρμολόγιο')">Ειρμολόγιο</div>
        <div class="chip" onclick="quickSearch('τυπικό')">Τυπικό</div>
    </div>

    <div class="view-controls">
        <button id="gridBtn" class="view-btn active" onclick="setView('grid')">🔲 Πλέγμα</button>
        <button id="listBtn" class="view-btn" onclick="setView('list')">📄 Λίστα</button>
    </div>

    <div class="results-container" id="results"></div>

    <div id="auth-modal">
        <div class="modal-content">
            <div class="modal-header" style="font-size:1.5em; font-weight:bold; margin-bottom:20px;">Πρόσβαση</div>
            <div class="auth-tabs">
                <div id="tab-login" class="auth-tab active" onclick="setAuthMode('login')">Σύνδεση</div>
                <div id="tab-register" class="auth-tab" onclick="setAuthMode('register')">Εγγραφή</div>
            </div>
            <div class="input-group"><input type="email" id="a-email" placeholder="Email"></div>
            <div class="input-group"><input type="password" id="a-password" placeholder="Κωδικός" oninput="checkPassword()"></div>
            <div id="pwd-constraints" class="pwd-rules">
                <div id="rule-len" class="pwd-rule">6+ χαρακτήρες</div>
                <div id="rule-up" class="pwd-rule">1 Κεφαλαίο (A-Z)</div>
                <div id="rule-num" class="pwd-rule">1 Αριθμό</div>
                <div id="rule-eng" class="pwd-rule">Μόνο Αγγλικά</div>
            </div>
            <button id="auth-submit" onclick="handleAuth()" class="submit-btn">Σύνδεση</button>
            <div id="a-msg" style="margin-top:10px; display:none;"></div>
            <button onclick="hideLogin()" style="background:none; border:none; color:#94a3b8; margin-top:15px; cursor:pointer;">Ακύρωση</button>
        </div>
    </div>

    <script>
        if (typeof window.supabaseClient === 'undefined') {
            const supabaseUrl = 'https://kfaodzjcdtmwwxwyzasq.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYW9kempjZHRtd3d4d3l6YXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUyOTQsImV4cCI6MjA5MjkzMTI5NH0.YhmIdxKx51KgCiYRaSlSlgVhoM8EAM3qdKBHlBnx1s8';
            window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        }

        let isLoggedIn = false;
        let currentMode = 'login';

        // QUICK SEARCH FUNCTION
        window.quickSearch = (term) => {
            const searchInput = document.getElementById('searchInput');
            searchInput.value = term;
            searchBooks(); // Εκτέλεση αναζήτησης
        };

        async function setupAuth() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            isLoggedIn = !!session;
            
            // Εμφάνιση Premium Chips αν είναι συνδεδεμένος
            document.getElementById('premium-chips').style.display = isLoggedIn ? 'flex' : 'none';

            const authDiv = document.createElement('div');
            authDiv.innerHTML = isLoggedIn ? '<button onclick="doLogout()" class="nav-auth-btn" style="background:#e74c3c;">🚪 Έξοδος</button>' : '<button onclick="showLogin()" class="nav-auth-btn" style="background:#2ecc71;">🔑 Είσοδος</button>';
            document.body.appendChild(authDiv);
        }

        async function searchBooks() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            try {
                const response = await fetch(`${window.location.origin}/search?q=${encodeURIComponent(query)}&free_only=${!isLoggedIn}`);
                const data = await response.json();
                container.innerHTML = '';
                if (!data.data || data.data.length === 0) {
                    container.innerHTML = '<div class="no-results">Δεν βρέθηκαν βιβλία.</div>';
                    return;
                }
                data.data.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    const buttons = book.pdf_urls.map(url => {
                        let name = decodeURIComponent(url.split('/').pop()).replace(/\.pdf$/i, '').replace(/_/g, ' ');
                        return `<a href="${url}" target="_blank" class="pdf-btn">📖 ${name}</a>`;
                    }).join('');
                    card.innerHTML = `<div><div class="book-title">${book.title}</div><div class="book-meta">👤 ${book.author_publisher || 'Άγνωστος'}</div></div><div class="pdf-buttons">${buttons}</div>`;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        // Auth handlers (Login/Register/Logout) - Όπως πριν
        window.showLogin = () => { document.getElementById('auth-modal').style.display = 'flex'; setAuthMode('login'); };
        window.hideLogin = () => { document.getElementById('auth-modal').style.display = 'none'; };
        window.setAuthMode = (mode) => {
            currentMode = mode;
            document.getElementById('tab-login').classList.toggle('active', mode === 'login');
            document.getElementById('tab-register').classList.toggle('active', mode === 'register');
            document.getElementById('pwd-constraints').style.display = mode === 'register' ? 'flex' : 'none';
            document.getElementById('auth-submit').innerText = mode === 'login' ? 'Σύνδεση' : 'Εγγραφή';
        };
        window.checkPassword = () => { /* Password rules logic */ };
        window.handleAuth = async () => {
            const email = document.getElementById('a-email').value;
            const password = document.getElementById('a-password').value;
            if (currentMode === 'login') {
                const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
                if (error) alert("Σφάλμα!"); else location.reload();
            } else {
                const { error } = await window.supabaseClient.auth.signUp({ email, password });
                if (error) alert(error.message); else location.reload();
            }
        };
        window.doLogout = async () => { await window.supabaseClient.auth.signOut(); location.reload(); };

        window.onload = async () => {
            await setupAuth();
            searchBooks();
        };
    </script>
</body>
</html>
