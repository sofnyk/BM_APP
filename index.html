<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ψηφιακό Αναλόγιο</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            /* Φωτεινό Θέμα */
            --primary: #2c3e50; 
            --accent: #27ae60; 
            --bg: #f8fafc; 
            --white: #ffffff;
            --text-color: #333333;
            --card-border: #f1f5f9;
            --success: #2ecc71;
            --danger: #e74c3c;
            --premium-gold: #d4af37;
            --admin-color: #f39c12;
            --input-bg: #f8fafc;
        }

        /* Σκοτεινό Θέμα (Dark Mode) */
        body.dark-mode {
            --primary: #94a3b8; 
            --accent: #2ecc71; 
            --bg: #0f172a; 
            --white: #1e293b;
            --text-color: #f1f5f9;
            --card-border: #334155;
            --input-bg: #0f172a;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        
        /* HEADER & TOP CONTROLS */
        header { background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%); color: white; padding: 60px 20px; text-align: center; position: relative; }
        header h1 { margin: 0; font-size: 2.5em; letter-spacing: 1px; }
        
        .top-left-controls { position: absolute; top: 20px; left: 20px; display: flex; gap: 10px; z-index: 100; }
        .theme-toggle { background: rgba(255,255,255,0.2); border: none; border-radius: 50%; width: 40px; height: 40px; font-size: 1.2em; cursor: pointer; color: white; transition: 0.3s; display: flex; justify-content: center; align-items: center; }
        .theme-toggle:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); }

        .auth-buttons-wrapper { position: absolute; top: 20px; right: 20px; display: flex; gap: 12px; z-index: 100; flex-wrap: wrap; justify-content: flex-end; }
        .nav-auth-btn { padding: 10px 18px; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); transition: 0.2s; font-size: 0.9em; }
        .nav-auth-btn:hover { transform: scale(1.05); }
        .login-btn { background-color: var(--success); }
        .logout-btn { background-color: var(--danger); }
        .account-btn { background-color: #3498db; }

        .main-content { flex: 1; }

        /* SEARCH BAR */
        .search-container { max-width: 700px; margin: -30px auto 20px auto; padding: 0 20px; position: relative; z-index: 1000; }
        .search-wrapper { position: relative; width: 100%; }
        #searchInput { width: 100%; padding: 20px 45px 20px 30px; font-size: 1.1em; border: none; border-radius: 50px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); outline: none; transition: 0.3s; box-sizing: border-box; background: var(--white); color: var(--text-color); }
        #searchInput:focus { transform: scale(1.01); box-shadow: 0 12px 30px rgba(0,0,0,0.2); }
        .clear-search { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #94a3b8; font-size: 1.2em; display: none; }
        .clear-search:hover { color: var(--danger); }

        .premium-chips-container { display: none; max-width: 700px; margin: 0 auto 30px auto; padding: 0 20px; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .chip { background: var(--white); border: 1px solid var(--premium-gold); color: var(--primary); padding: 8px 16px; border-radius: 20px; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
        .chip:hover { background: var(--premium-gold); color: white; transform: translateY(-2px); }

        /* VIEW & SORT CONTROLS */
        .view-controls { max-width: 1200px; margin: 0 auto 20px auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .sort-dropdown { padding: 10px 15px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--white); color: var(--text-color); font-weight: 600; outline: none; cursor: pointer; }
        .view-btns { display: flex; gap: 10px; }
        .view-btn { background-color: var(--white); border: 1px solid var(--card-border); padding: 10px 18px; border-radius: 10px; cursor: pointer; font-weight: 600; color: #64748b; }
        .view-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }

        /* CARDS */
        .results-container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding-bottom: 40px; }
        .book-card { background: var(--white); border-radius: 18px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; transition: 0.3s; border: 1px solid var(--card-border); position: relative; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .book-title { font-size: 1.3em; color: var(--primary); font-weight: 700; margin-bottom: 8px; padding-right: 30px; }
        .book-meta { font-size: 0.95em; color: #64748b; margin-bottom: 15px; }
        
        /* FAVORITES ICON */
        .fav-icon { position: absolute; top: 20px; right: 20px; font-size: 1.5em; cursor: pointer; color: #cbd5e1; transition: 0.2s; background: none; border: none; padding: 0; }
        .fav-icon.is-fav { color: #e74c3c; animation: pop 0.3s ease; }
        .fav-icon:hover { transform: scale(1.1); }
        @keyframes pop { 50% { transform: scale(1.3); } 100% { transform: scale(1); } }

        .pdf-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: auto; }
        .pdf-btn { background-color: var(--accent); color: white; text-decoration: none; padding: 12px 18px; border-radius: 10px; font-weight: 700; font-size: 0.9em; flex: 1; text-align: center; transition: 0.2s; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 6px; box-shadow: 0 4px 0 #1e8449; }
        .pdf-btn:hover { background-color: #2ecc71; transform: translateY(2px); box-shadow: 0 2px 0 #1e8449; }

        .results-container.list-view { display: flex; flex-direction: column; gap: 15px; }
        .results-container.list-view .book-card { flex-direction: row; align-items: center; padding: 15px 30px; }
        .results-container.list-view .pdf-buttons { margin-top: 0; margin-left: 20px; min-width: 200px; }

        .site-footer { background-color: #1a252f; color: #cbd5e1; text-align: center; padding: 25px 20px; font-size: 0.9em; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); margin-top: auto; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: 10000; justify-content: center; align-items: center; backdrop-filter: blur(5px); overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--white); color: var(--text-color); padding: 40px; border-radius: 24px; width: 360px; max-width: 100%; text-align: center; position: relative; margin: auto; }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 1.5em; color: #94a3b8; cursor: pointer; transition: 0.2s; background: none; border: none; padding: 0; }
        .close-modal:hover { color: var(--danger); }
        .modal-header { font-size: 1.5em; color: var(--primary); font-weight: 800; margin-bottom: 25px; }

        .input-group { position: relative; margin-bottom: 15px; text-align: left; }
        .input-group input, .input-group select { width: 100%; padding: 14px 14px 14px 40px; border: 2px solid var(--card-border); border-radius: 12px; box-sizing: border-box; font-size: 1em; font-family: inherit; color: var(--text-color); background: var(--input-bg); }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; z-index: 10;}
        
        .submit-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1.05em; transition: 0.3s; margin-top: 10px; }
        
        /* PDF VIEWER MODAL */
        #pdf-modal .modal-content { width: 90%; height: 90%; padding: 50px 20px 20px 20px; display: flex; flex-direction: column; }
        #pdf-frame { flex: 1; border: none; border-radius: 10px; background: #ddd; width: 100%; }
        .pdf-actions { margin-top: 10px; display: flex; justify-content: center; gap: 10px; }
    </style>
</head>
<body class="light-mode">

    <header>
        <div class="top-left-controls">
            <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" title="Αλλαγή Θέματος">🌙</button>
        </div>
        <h1>Ψηφιακό Αναλόγιο</h1>
        <p>Βιβλιοθήκη Βυζαντινής Μουσικής</p>
    </header>

    <div class="main-content">
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="searchInput" placeholder="🔍 Αναζήτηση (και χωρίς τόνους)..." oninput="handleSearchInput()">
                <span id="clearSearchBtn" class="clear-search" onclick="clearSearch()" title="Καθαρισμός">✖</span>
            </div>
        </div>

        <div id="premium-chips" class="premium-chips-container">
            <div class="chip" onclick="quickSearch('αναστασιματάριο')">Αναστασιματάριο</div>
            <div class="chip" onclick="quickSearch('δοξαστάριο')">Δοξαστάριο</div>
            <div class="chip" onclick="quickSearch('ειρμολόγιο')">Ειρμολόγιο</div>
            <div class="chip" onclick="quickSearch('τυπικό')">Τυπικό</div>
        </div>

        <div class="view-controls">
            <select id="sortCombo" class="sort-dropdown" onchange="renderBooks()">
                <option value="alpha">⬇️ Αλφαβητικά (Α-Ω)</option>
                <option value="newest">📅 Νεότερα πρώτα</option>
                <option value="oldest">📅 Παλαιότερα πρώτα</option>
            </select>

            <div class="view-btns">
                <button id="gridBtn" class="view-btn active" onclick="setView('grid')">🔲 Πλέγμα</button>
                <button id="listBtn" class="view-btn" onclick="setView('list')">📄 Λίστα</button>
            </div>
        </div>

        <div class="results-container" id="results"></div>
    </div>

    <footer class="site-footer">
        &copy; <span id="current-year"></span> <span>Ψηφιακό Αναλόγιο.</span> Με επιφύλαξη παντός δικαιώματος.
    </footer>

    <div id="pdf-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="closePdf()">&times;</button>
            <iframe id="pdf-frame" src=""></iframe>
            <div class="pdf-actions">
                <a id="pdf-external-link" href="#" target="_blank" class="view-btn" style="text-decoration:none;">Άνοιγμα σε νέα καρτέλα</a>
            </div>
        </div>
    </div>

    <div id="account-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="hideAccount()">&times;</button>
            <div class="modal-header">Ο Λογαριασμός μου</div>
            <p>Συνδεδεμένος ως: <br><strong id="acc-email" style="color:var(--accent);"></strong></p>
            <hr style="border:0; border-top:1px solid var(--card-border); margin:20px 0;">
            <button onclick="showFavoritesOnly()" class="submit-btn" style="background:#e74c3c;">❤️ Τα Αγαπημένα μου</button>
            <button onclick="doLogout()" class="submit-btn" style="background:#95a5a6; margin-top:10px;">🚪 Αποσύνδεση</button>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="close-modal" onclick="hideLogin()">&times;</button>
            <div class="modal-header">Πρόσβαση</div>
            <div class="input-group"><span class="input-icon">📧</span><input type="email" id="a-email" placeholder="Email" onkeypress="if(event.key === 'Enter') handleAuth()"></div>
            <div class="input-group"><span class="input-icon">🔒</span><input type="password" id="a-password" placeholder="Κωδικός" onkeypress="if(event.key === 'Enter') handleAuth()"></div>
            <button onclick="handleAuth()" class="submit-btn">Σύνδεση / Εγγραφή</button>
            <div id="a-msg" style="margin-top:10px; display:none; padding:10px; border-radius:8px;"></div>
        </div>
    </div>

    <script>
        if (typeof window.supabaseClient === 'undefined') {
            const supabaseUrl = 'https://kfaodzjcdtmwwxwyzasq.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYW9kempjZHRtd3d4d3l6YXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUyOTQsImV4cCI6MjA5MjkzMTI5NH0.YhmIdxKx51KgCiYRaSlSlgVhoM8EAM3qdKBHlBnx1s8';
            window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        }

        let isLoggedIn = false;
        let isAdmin = false; 
        let userEmail = "";
        let allBooks = []; 
        let filteredBooks = []; // Βοηθάει στην ταξινόμηση
        let userFavorites = []; // Λίστα με τίτλους αγαπημένων
        let showingFavorites = false; // Flag για να ξέρουμε αν βλέπουμε μόνο τα αγαπημένα

        const ADMIN_EMAIL = "sofokles3000@gmail.com"; 

        // ======== DARK MODE ========
        function toggleTheme() {
            const body = document.body;
            body.classList.toggle('dark-mode');
            const isDark = body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
        }

        function loadTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                document.getElementById('themeBtn').innerText = '☀️';
            }
        }

        window.normalizeText = (text) => text ? text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : '';

        // ======== ΑΓΑΠΗΜΕΝΑ (FAVORITES) ========
        function loadFavorites() {
            if (!isLoggedIn) return;
            const saved = localStorage.getItem('favs_' + userEmail);
            userFavorites = saved ? JSON.parse(saved) : [];
        }

        function saveFavorites() {
            if (!isLoggedIn) return;
            localStorage.setItem('favs_' + userEmail, JSON.stringify(userFavorites));
        }

        window.toggleFav = (bookTitle) => {
            if (!isLoggedIn) {
                alert("Πρέπει να συνδεθείτε για να αποθηκεύσετε αγαπημένα!");
                return;
            }
            if (userFavorites.includes(bookTitle)) {
                userFavorites = userFavorites.filter(t => t !== bookTitle);
            } else {
                userFavorites.push(bookTitle);
            }
            saveFavorites();
            renderBooks(); // Ξανασχεδιάζει για να αλλάξει η καρδούλα
        };

        window.showFavoritesOnly = () => {
            showingFavorites = true;
            hideAccount();
            document.getElementById('searchInput').value = ""; // Καθαρίζει την αναζήτηση
            document.getElementById('clearSearchBtn').style.display = 'none';
            searchBooks(); 
        };

        // ======== PDF VIEWER ========
        window.openPdf = (url) => {
            document.getElementById('pdf-frame').src = url;
            document.getElementById('pdf-external-link').href = url;
            document.getElementById('pdf-modal').style.display = 'flex';
        };
        window.closePdf = () => {
            document.getElementById('pdf-modal').style.display = 'none';
            document.getElementById('pdf-frame').src = ""; // Σταματάει το κατέβασμα στο background
        };

        // ======== ΚΑΘΑΡΙΣΜΟΣ ΑΝΑΖΗΤΗΣΗΣ ========
        window.handleSearchInput = () => {
            const val = document.getElementById('searchInput').value;
            document.getElementById('clearSearchBtn').style.display = val.length > 0 ? 'block' : 'none';
            showingFavorites = false; // Αν ψάξει, βγαίνει από το mode Αγαπημένων
            searchBooks();
        };

        window.clearSearch = () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('clearSearchBtn').style.display = 'none';
            searchBooks();
        };
        window.quickSearch = (term) => { 
            document.getElementById('searchInput').value = term; 
            handleSearchInput(); 
        };

        async function setupAuth() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            isLoggedIn = !!session;
            
            if (isLoggedIn) {
                userEmail = session.user.email;
                if (userEmail === ADMIN_EMAIL) isAdmin = true;
                loadFavorites();
                document.getElementById('acc-email').innerText = userEmail;
            }

            document.getElementById('premium-chips').style.display = isLoggedIn ? 'flex' : 'none';

            const authDiv = document.createElement('div');
            authDiv.className = 'auth-buttons-wrapper';
            
            if (isLoggedIn) {
                authDiv.innerHTML = `<button onclick="showAccount()" class="nav-auth-btn account-btn">👤 Λογαριασμός</button>`;
                // Ο Admin δεν φαίνεται εδώ πια, το κρατάμε καθαρό. Μπορεί να μπει στο My Account.
            } else {
                authDiv.innerHTML = `<button onclick="showLogin()" class="nav-auth-btn login-btn">🔑 Είσοδος</button>`;
            }
            
            document.body.appendChild(authDiv);
        }

        async function loadBooks() {
            const container = document.getElementById('results');
            try {
                const response = await fetch(`${window.location.origin}/search?q=&free_only=${!isLoggedIn}`);
                const data = await response.json();
                allBooks = data.data || [];
                searchBooks(); 
            } catch (e) { 
                console.error(e); 
            }
        }

        window.searchBooks = () => {
            const query = window.normalizeText(document.getElementById('searchInput').value);
            
            // 1. Φιλτράρισμα (Αναζήτηση ή Αγαπημένα)
            filteredBooks = allBooks.filter(book => {
                if (showingFavorites) {
                    return userFavorites.includes(book.title);
                } else {
                    const title = window.normalizeText(book.title);
                    const author = window.normalizeText(book.author_publisher);
                    return title.includes(query) || author.includes(query);
                }
            });

            renderBooks();
        };

        // ======== ΤΑΞΙΝΟΜΗΣΗ ΚΑΙ ΕΜΦΑΝΙΣΗ ========
        window.renderBooks = () => {
            const sortVal = document.getElementById('sortCombo').value;
            const container = document.getElementById('results');

            // Ταξινόμηση
            filteredBooks.sort((a, b) => {
                if (sortVal === 'alpha') return a.title.localeCompare(b.title, 'el');
                if (sortVal === 'newest') return (b.publication_year || 0) - (a.publication_year || 0);
                if (sortVal === 'oldest') return (a.publication_year || 9999) - (b.publication_year || 9999);
            });

            container.innerHTML = '';
            if (filteredBooks.length === 0) { 
                container.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">${showingFavorites ? 'Δεν έχετε προσθέσει αγαπημένα ακόμα.' : 'Δεν βρέθηκαν βιβλία.'}</div>`; 
                return; 
            }

            filteredBooks.forEach(book => {
                const card = document.createElement('div');
                card.className = 'book-card';
                
                const isFav = userFavorites.includes(book.title);
                const favBtnHtml = isLoggedIn ? `<button class="fav-icon ${isFav ? 'is-fav' : ''}" onclick="toggleFav('${book.title.replace(/'/g, "\\'")}')" title="Προσθήκη στα Αγαπημένα">${isFav ? '❤️' : '🤍'}</button>` : '';

                const buttons = book.pdf_urls.map(url => {
                    let cleanName = decodeURIComponent(url.split('/').pop()).replace(/\.pdf$/i, '').replace(/_bkm/i, '').replace(/bkm/i, '').replace(/_/g, ' ').trim();
                    let label = book.pdf_urls.length > 1 ? `📖 ${cleanName}` : `📖 Άνοιγμα`;
                    // ΠΡΟΣΟΧΗ: Καλεί την openPdf αντί για href
                    return `<button onclick="openPdf('${url}')" class="pdf-btn" title="Προβολή">${label}</button>`;
                }).join('');

                card.innerHTML = `
                    ${favBtnHtml}
                    <div>
                        <div class="book-title">${book.title}</div>
                        <div class="book-meta"><div>👤 ${book.author_publisher || 'Άγνωστος'}</div><div>📅 Έτος: ${book.publication_year || 'Χ.Χ.'}</div></div>
                    </div>
                    <div class="pdf-buttons">${buttons}</div>
                `;
                container.appendChild(card);
            });
        };

        window.setView = (v) => {
            const c = document.getElementById('results');
            v === 'list' ? c.classList.add('list-view') : c.classList.remove('list-view');
            document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
            document.getElementById('listBtn').classList.toggle('active', v === 'list');
            localStorage.setItem('bm_view_pref', v);
        };

        window.showLogin = () => { document.getElementById('auth-modal').style.display = 'flex'; };
        window.hideLogin = () => { document.getElementById('auth-modal').style.display = 'none'; };
        window.showAccount = () => { document.getElementById('account-modal').style.display = 'flex'; };
        window.hideAccount = () => { document.getElementById('account-modal').style.display = 'none'; };

        window.handleAuth = async () => {
            const email = document.getElementById('a-email').value; const password = document.getElementById('a-password').value;
            const msgEl = document.getElementById('a-msg');
            msgEl.style.display = 'block'; msgEl.innerText = "Επεξεργασία...";
            const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
            if (error) { msgEl.innerText = "Λάθος στοιχεία!"; } else { location.reload(); }
        };
        window.doLogout = async () => { await window.supabaseClient.auth.signOut(); location.reload(); };

        window.onload = async () => {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            loadTheme();
            window.setView(localStorage.getItem('bm_view_pref') || 'grid');
            await setupAuth();
            loadBooks(); 
        };
    </script>
</body>
</html>
