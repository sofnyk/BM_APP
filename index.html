<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ψηφιακό Αναλόγιο</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #c0392b; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: #333; }
        header { background-color: var(--primary); color: white; padding: 30px 20px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1); position: relative; }
        h1 { margin: 0; font-size: 2.5em; }
        .search-container { max-width: 800px; margin: -25px auto 20px auto; padding: 0 20px; position: relative; }
        #searchInput { width: 100%; padding: 20px 25px; font-size: 1.2em; border: 2px solid #e0e0e0; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); outline: none; box-sizing: border-box; }
        .view-controls { max-width: 1200px; margin: 0 auto 20px auto; padding: 0 20px; display: flex; justify-content: flex-end; gap: 10px; }
        .view-btn { background-color: #e0e0e0; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .view-btn.active { background-color: var(--primary); color: white; }
        .results-container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        .book-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .results-container.list-view { display: flex; flex-direction: column; gap: 15px; }
        .results-container.list-view .book-card { flex-direction: row; align-items: center; padding: 15px 25px; }
        .book-title { font-size: 1.2em; color: var(--primary); font-weight: bold; }
        .pdf-btn { background-color: var(--accent); color: white; text-decoration: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
    <header>
        <h1>Ψηφιακό Αναλόγιο</h1>
        <p>Βιβλιοθήκη Βυζαντινής Μουσικής</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Αναζήτηση..." oninput="searchBooks()">
    </div>

    <div class="view-controls">
        <button id="gridBtn" class="view-btn active" onclick="setView('grid')">🔲 Πλέγμα</button>
        <button id="listBtn" class="view-btn" onclick="setView('list')">📄 Λίστα</button>
    </div>

    <div class="results-container" id="results"></div>

    <script>
        // FIX 1: Αποφυγή redeclaration
        if (typeof window.supabaseClient === 'undefined') {
            const supabaseUrl = 'https://kfaodzjcdtmwwxwyzasq.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYW9kempjZHRtd3d4d3l6YXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUyOTQsImV4cCI6MjA5MjkzMTI5NH0.YhmIdxKx51KgCiYRaSlSlgVhoM8EAM3qdKBHlBnx1s8';
            window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        }

        let isLoggedIn = false;

        async function setupAuth() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            isLoggedIn = !!session;
            
            const authDiv = document.createElement('div');
            authDiv.style.cssText = "position: absolute; top: 15px; right: 15px; z-index: 9999;";
            authDiv.innerHTML = isLoggedIn ? 
                '<button onclick="doLogout()" style="padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🚪 Έξοδος</button>' : 
                '<button onclick="showLogin()" style="padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">🔑 Είσοδος</button>';
            document.body.appendChild(authDiv);

            const modal = document.createElement('div');
            modal.id = "login-modal";
            modal.style.cssText = "display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center;";
            modal.innerHTML = `<div style="background: white; padding: 30px; border-radius: 10px; text-align: center; width: 300px;">
                <h3>Είσοδος Μελών</h3>
                <input type="email" id="l-email" placeholder="Email" style="width: 100%; padding: 10px; margin-bottom: 10px;">
                <input type="password" id="l-pass" placeholder="Κωδικός" style="width: 100%; padding: 10px; margin-bottom: 15px;">
                <button onclick="tryLogin()" style="width: 100%; padding: 10px; background: #2980b9; color: white; border: none; border-radius: 5px; font-weight: bold;">Σύνδεση</button>
                <button onclick="hideLogin()" style="width: 100%; padding: 10px; background: #95a5a6; color: white; border: none; border-radius: 5px; margin-top: 10px;">Ακύρωση</button>
            </div>`;
            document.body.appendChild(modal);
        }

        async function searchBooks() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            try {
                // FIX 3: Absolute URL fetch
                const baseUrl = window.location.origin;
                const response = await fetch(`${baseUrl}/search?q=${encodeURIComponent(query)}&free_only=${!isLoggedIn}`);
                const data = await response.json();
                container.innerHTML = '';
                if (!data.data || data.data.length === 0) {
                    container.innerHTML = '<div class="no-results">Δεν βρέθηκαν βιβλία.</div>';
                    return;
                }
                data.data.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    const buttons = book.pdf_urls.map(url => `<a href="${url}" target="_blank" class="pdf-btn">📖 Άνοιγμα</a>`).join('');
                    card.innerHTML = `<div><div class="book-title">${book.title}</div><div style="font-size:0.9em; color:#666;">👤 ${book.author_publisher || 'Άγνωστος'}</div></div><div class="pdf-buttons">${buttons}</div>`;
                    container.appendChild(card);
                });
            } catch (e) { console.error("Fetch Error:", e); }
        }

        // FIX 2: Explicit window mapping
        window.setView = function(viewType) {
            const container = document.getElementById('results');
            const gridBtn = document.getElementById('gridBtn');
            const listBtn = document.getElementById('listBtn');
            if (viewType === 'list') {
                container.classList.add('list-view');
                listBtn.classList.add('active'); gridBtn.classList.remove('active');
            } else {
                container.classList.remove('list-view');
                gridBtn.classList.add('active'); listBtn.classList.remove('active');
            }
            localStorage.setItem('bm_view_pref', viewType);
        };

        window.showLogin = () => document.getElementById('login-modal').style.display = 'flex';
        window.hideLogin = () => document.getElementById('login-modal').style.display = 'none';
        window.tryLogin = async () => {
            const email = document.getElementById('l-email').value;
            const password = document.getElementById('l-pass').value;
            const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Λάθος στοιχεία!"); else location.reload();
        };
        window.doLogout = async () => { await window.supabaseClient.auth.signOut(); location.reload(); };
        window.searchBooks = searchBooks;

        // FIX 4: Stability onload
        window.onload = async () => {
            try {
                const savedView = localStorage.getItem('bm_view_pref') || 'grid';
                window.setView(savedView);
                await setupAuth();
                await searchBooks();
            } catch (e) { console.error("Init Error:", e); }
        };
    </script>
</body>
</html>
