<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ψηφιακό Αναλόγιο</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --primary: #2c3e50; 
            --accent: #27ae60; 
            --bg: #f4f7f6; 
            --white: #ffffff;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            margin: 0; padding: 0; background-color: var(--bg); color: #333; 
        }

        header {
            background: linear-gradient(135deg, #1a252f 0%, #2c3e50 100%);
            color: white; padding: 60px 20px; text-align: center; position: relative;
        }

        header h1 { margin: 0; font-size: 2.5em; letter-spacing: 1px; }

        .search-container {
            max-width: 700px;
            margin: -30px auto 30px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1000;
        }

        #searchInput {
            width: 100%;
            padding: 20px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            outline: none;
            transition: 0.3s;
            box-sizing: border-box;
        }

        #searchInput:focus { transform: scale(1.01); box-shadow: 0 12px 30px rgba(0,0,0,0.2); }

        .view-controls {
            max-width: 1200px; margin: 0 auto 20px auto; padding: 0 20px;
            display: flex; justify-content: flex-end; gap: 10px;
        }

        .view-btn {
            background-color: var(--white); border: 1px solid #ddd; padding: 10px 18px;
            border-radius: 10px; cursor: pointer; font-weight: 600; color: #666;
        }

        .view-btn.active { background-color: var(--primary); color: white; border-color: var(--primary); }

        .results-container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px;
        }

        .book-card {
            background: var(--white); border-radius: 18px; padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: flex;
            flex-direction: column; justify-content: space-between; transition: 0.3s;
        }

        .book-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        .book-title { font-size: 1.3em; color: var(--primary); font-weight: 700; margin-bottom: 8px; }

        .book-meta { font-size: 0.95em; color: #7f8c8d; margin-bottom: 15px; }
        .book-meta div { margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }

        .pdf-buttons { display: flex; flex-wrap: wrap; gap: 10px; margin-top: auto; }

        /* Γκρουπ κουμπιών για να είναι κολλητά το Άνοιγμα και η Λήψη */
        .pdf-btn-group {
            display: flex;
            gap: 5px;
            flex: 1;
            min-width: 150px;
        }

        .pdf-btn {
            background-color: var(--accent); color: white; text-decoration: none;
            padding: 12px 15px; border-radius: 10px; font-weight: 700; font-size: 0.9em;
            flex: 1; text-align: center; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            box-shadow: 0 4px 0 #1e8449;
        }

        .pdf-btn:hover { 
            background-color: #2ecc71; 
            transform: translateY(2px); 
            box-shadow: 0 2px 0 #1e8449; 
        }

        /* Το νέο κουμπάκι Λήψης (Σκούρο Μπλε) */
        .pdf-btn.download-btn {
            flex: 0 0 auto; /* Δεν πιάνει όλο τον χώρο, πιάνει μόνο όσο χρειάζεται το βελάκι */
            background-color: var(--primary);
            box-shadow: 0 4px 0 #1a252f;
        }
        
        .pdf-btn.download-btn:hover {
            background-color: #34495e;
            box-shadow: 0 2px 0 #1a252f;
        }

        .nav-auth-btn {
            position: absolute; top: 20px; right: 20px;
            padding: 10px 20px; border: none; border-radius: 50px;
            font-weight: 700; cursor: pointer; color: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .login-btn { background-color: var(--success); }
        .logout-btn { background-color: var(--danger); }

        #auth-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content { background: white; padding: 40px; border-radius: 20px; width: 320px; text-align: center; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }

        .results-container.list-view { display: flex; flex-direction: column; gap: 15px; }
        .results-container.list-view .book-card { flex-direction: row; align-items: center; padding: 15px 30px; }
        .results-container.list-view .pdf-buttons { margin-top: 0; margin-left: 20px; min-width: 250px; }
    </style>
</head>
<body>

    <header>
        <h1>Ψηφιακό Αναλόγιο</h1>
        <p>Βιβλιοθήκη Βυζαντινής Μουσικής</p>
    </header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="🔍 Αναζήτηση..." oninput="searchBooks()">
    </div>

    <div class="view-controls">
        <button id="gridBtn" class="view-btn active" onclick="setView('grid')">🔲 Πλέγμα</button>
        <button id="listBtn" class="view-btn" onclick="setView('list')">📄 Λίστα</button>
    </div>

    <div class="results-container" id="results"></div>

    <script>
        if (typeof window.supabaseClient === 'undefined') {
            const supabaseUrl = 'https://kfaodzjcdtmwwxwyzasq.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtmYW9kempjZHRtd3d4d3l6YXNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczNTUyOTQsImV4cCI6MjA5MjkzMTI5NH0.YhmIdxKx51KgCiYRaSlSlgVhoM8EAM3qdKBHlBnx1s8';
            window.supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        }

        let isLoggedIn = false;

        async function setupAuth() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            isLoggedIn = !!session;
            const authDiv = document.createElement('div');
            authDiv.innerHTML = isLoggedIn ? '<button onclick="doLogout()" class="nav-auth-btn logout-btn">🚪 Έξοδος</button>' : '<button onclick="showLogin()" class="nav-auth-btn login-btn">🔑 Είσοδος</button>';
            document.body.appendChild(authDiv);
        }

        async function searchBooks() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            try {
                const response = await fetch(`${window.location.origin}/search?q=${encodeURIComponent(query)}&free_only=${!isLoggedIn}`);
                const data = await response.json();
                container.innerHTML = '';
                
                if (!data.data || data.data.length === 0) {
                    container.innerHTML = '<div class="no-results">Δεν βρέθηκαν βιβλία.</div>';
                    return;
                }

                data.data.forEach(book => {
                    const card = document.createElement('div');
                    card.className = 'book-card';
                    
                    const buttons = book.pdf_urls.map(url => {
                        let rawFileName = decodeURIComponent(url.split('/').pop()).replace(/\.pdf$/i, '');
                        
                        const hasBookmarks = rawFileName.toLowerCase().includes('bkm');
                        const bkmBadge = hasBookmarks ? ' 🔖' : '';
                        const tooltip = hasBookmarks ? 'Διαθέτει σελιδοδείκτες (Bookmarks)' : 'Άνοιγμα PDF';
                        
                        let cleanName = rawFileName
                                        .replace(/-bkm/i, '')
                                        .replace(/_bkm/i, '')
                                        .replace(/ bkm/i, '')
                                        .replace(/bkm/i, '')
                                        .replace(/_/g, ' ')
                                        .trim();
                        
                        let label = book.pdf_urls.length > 1 ? `📖 ${cleanName}${bkmBadge}` : `📖 Άνοιγμα${bkmBadge}`;
                        
                        // Το μαγικό link για απευθείας κατέβασμα
                        let downloadUrl = url + '?download=';
                        
                        return `
                            <div class="pdf-btn-group">
                                <a href="${url}" target="_blank" class="pdf-btn" title="${tooltip}">${label}</a>
                                <a href="${downloadUrl}" class="pdf-btn download-btn" title="Απευθείας Λήψη (Download)" download>⬇️</a>
                            </div>
                        `;
                    }).join('');

                    card.innerHTML = `
                        <div>
                            <div class="book-title">${book.title}</div>
                            <div class="book-meta">
                                <div>👤 ${book.author_publisher || 'Άγνωστος'}</div>
                                <div>📅 Έτος: ${book.publication_year || 'Χ.Χ.'}</div>
                            </div>
                        </div>
                        <div class="pdf-buttons">${buttons}</div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }

        window.setView = (v) => {
            const c = document.getElementById('results');
            v === 'list' ? c.classList.add('list-view') : c.classList.remove('list-view');
            document.getElementById('gridBtn').classList.toggle('active', v === 'grid');
            document.getElementById('listBtn').classList.toggle('active', v === 'list');
            localStorage.setItem('bm_view_pref', v);
        };

        window.showLogin = () => document.getElementById('auth-modal').style.display = 'flex';
        window.hideLogin = () => document.getElementById('auth-modal').style.display = 'none';
        window.tryLogin = async () => {
            const email = document.getElementById('l-email').value;
            const password = document.getElementById('l-pass').value;
            const { error } = await window.supabaseClient.auth.signInWithPassword({ email, password });
            if (error) alert("Λάθος στοιχεία!"); else location.reload();
        };
        window.doLogout = async () => { await window.supabaseClient.auth.signOut(); location.reload(); };

        window.onload = async () => {
            window.setView(localStorage.getItem('bm_view_pref') || 'grid');
            await setupAuth();
            searchBooks();
        };
    </script>

    <div id="auth-modal">
        <div class="modal-content">
            <h3>Είσοδος Μελών</h3>
            <input type="email" id="l-email" placeholder="Email">
            <input type="password" id="l-pass" placeholder="Κωδικός">
            <button onclick="tryLogin()" class="submit-btn">Σύνδεση</button>
            <button onclick="hideLogin()" style="background:none; border:none; color:#7f8c8d; margin-top:15px; cursor:pointer;">Ακύρωση</button>
        </div>
    </div>

</body>
</html>
